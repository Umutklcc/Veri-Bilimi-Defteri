<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UmutKlcc - Dünya Veri Dedektifi</title>
    <style>
        :root { --neon: #00d4ff; --accent: #00ff88; --bg: #020617; }
        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }
        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #001a33 0%, #020617 100%);
            z-index: -1;
        }
        .circle {
            position: absolute; border-radius: 50%; background: var(--neon);
            filter: blur(100px); opacity: 0.1; animation: move 20s infinite alternate;
        }
        @keyframes move { from { transform: translate(0, 0); } to { transform: translate(100px, 100px); } }

        .container {
            background: rgba(15, 23, 42, 0.9); padding: 30px; border-radius: 25px;
            border: 1px solid rgba(0, 212, 255, 0.4); width: 400px; text-align: center;
            backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .profil-img {
            width: 90px; height: 90px; border-radius: 50%;
            border: 2px solid var(--neon); margin-bottom: 15px;
            object-fit: cover; box-shadow: 0 0 15px var(--neon);
        }
        .game-box { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px; margin: 15px 0; }
        input {
            width: 85%; padding: 12px; border-radius: 10px; border: 1px solid #334155;
            background: rgba(255,255,255,0.05); color: #fff; margin-bottom: 10px; text-align: center;
        }
        button {
            background: linear-gradient(45deg, var(--neon), var(--accent));
            color: #020617; border: none; padding: 12px; border-radius: 10px;
            font-weight: bold; cursor: pointer; width: 90%; transition: 0.3s;
        }
        button:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--neon); }
        #feedback { margin-top: 15px; font-weight: bold; min-height: 50px; color: var(--accent); font-size: 0.9rem; }
        .links { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        .btn-s { color: #94a3b8; text-decoration: none; font-size: 0.7rem; padding: 5px 10px; border: 1px solid #334155; border-radius: 10px; transition: 0.3s; }
        .btn-s:hover { border-color: var(--neon); color: var(--neon); }
    </style>
</head>
<body>

<div class="bg-animate"><div class="circle" style="width:400px; height:400px; top:-50px; left:-50px;"></div></div>

<div class="container">
    <img src="resimler/profil.jpeg" alt="Umut" class="profil-img">

    <p style="font-size: 0.7rem; color: #94a3b8;">Dünya koordinatlarını analiz et ve hedefi bul!</p>

    <div class="game-box">
        <input type="text" id="in" placeholder="Ülke adı yazın (Örn: Türkiye)..." onkeypress="if(event.key==='Enter') play()">
        <button onclick="play()">KONUMU ANALİZ ET</button>
        <div id="feedback">Bir ülke girerek analizi başlat!</div>
    </div>

    <div class="links">

        <a href="Görev%202/index.html" class="btn-s">🚀 Ödev</a>

</div>
