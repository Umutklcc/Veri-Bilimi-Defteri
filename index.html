<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görev 10 UmutKlcc Ödev</title>
    <style>
        body {
            margin: 0;
            background: #020617;
            color: #38bdf8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        /* Fareyi takip eden neon parlama efekti */
        #glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 0;
            transition: 0.1s linear;
        }
        .card {
            background: rgba(30, 41, 59, 0.6);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            backdrop-filter: blur(12px);
            text-align: center;
            z-index: 1;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            width: 320px;
        }
        .profil-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
            margin-bottom: 20px;
            object-fit: cover;
            transition: 0.4s;
        }
        .profil-img:hover {
            transform: scale(1.1) rotate(5deg);
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #f8fafc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        p {
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .btn {
            display: block;
            margin: 12px auto;
            padding: 14px;
            color: #38bdf8;
            text-decoration: none;
            border: 1px solid #38bdf8;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
            background: rgba(56, 189, 248, 0.05);
            font-size: 0.85rem;
        }
        .btn:hover {
            background: #38bdf8;
            color: #020617;
            box-shadow: 0 0 25px #38bdf8;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div id="glow"></div>

    <div class="card">
        <img src="resimler/profil.jpeg" alt="UmutKlcc" class="profil-img">
        
        <h1>Görev 10 UmutKlcc Ödev</h1>
        <p>Veri Bilimi ve Analitiği Çalışmaları</p>

        <div class="links">
            <a href="Görev%202/index.html" class="btn">🚀 GÖREV 2: UYGULAMA</a>
            
            <a href="Figure_1.png" class="btn">📊 GÖREV 7: GRAFİĞİ GÖRÜNTÜLE</a>
            
            <a href="sinav_verileri.csv" class="btn">📂 GÖREV 7: VERİ SETİ (CSV)</a>
        </div>
    </div>

    <script>
        // Fare takip kodu
        const glow = document.getElementById('glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
    </script>

</body>
</html>
