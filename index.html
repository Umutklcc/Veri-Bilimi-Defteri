<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görev 10 UmutKlcc Ödev</title>
    <style>
        :root { --neon-green: #0f0; --neon-blue: #00d4ff; --bg: #000510; }
        body {
            margin: 0; background: var(--bg); color: var(--neon-blue);
            font-family: 'Courier New', Courier, monospace; /* Terminal tipi yazı */
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        /* İnteraktif Veri Simülasyonu Kanvası */
        #dataCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; opacity: 0.6;
        }
        .card {
            background: rgba(0, 10, 30, 0.85); padding: 40px;
            border-radius: 16px; border: 2px solid var(--neon-blue);
            backdrop-filter: blur(10px); text-align: center;
            z-index: 1; box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            width: 320px; transition: 0.3s;
        }
        .card:hover { box-shadow: 0 0 50px var(--neon-green); border-color: var(--neon-green); }
        .profil-img {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid var(--neon-blue); margin-bottom: 20px;
            object-fit: cover; transition: 0.5s;
        }
        .card:hover .profil-img { border-color: var(--neon-green); transform: scale(1.05); }
        h1 { font-size: 1.2rem; margin: 0 0 10px 0; text-transform: uppercase; color: #fff; letter-spacing: 1px; }
        .data-stream { font-size: 11px; color: var(--neon-green); margin-bottom: 25px; height: 15px; overflow: hidden; }
        
        .btn {
            display: block; margin: 10px auto; padding: 12px;
            color: var(--neon-blue); text-decoration: none;
            border: 1px solid var(--neon-blue); border-radius: 4px;
            font-weight: bold; transition: 0.3s;
            background: rgba(0, 212, 255, 0.03); font-size: 0.8rem;
        }
        .btn:hover {
            background: var(--neon-blue); color: #000;
            box-shadow: 0 0 20px var(--neon-blue); transform: translateY(-2px);
        }
        .footer-note { font-size: 10px; margin-top: 25px; color: #64748b; }
    </style>
</head>
<body>

    <canvas id="dataCanvas"></canvas>

    <div class="card">
        <img src="resimler/profil.jpeg" alt="UmutKlcc" class="profil-img">
        <h1>GÖREV 10: UMUTKLCC</h1>
        <div class="data-stream" id="stream">SİSTEM HAZIR > VERİ AKIŞI BEKLENİYOR...</div>

        <div class="links">
            <a href="Görev%202/index.html" class="btn">[ GÖREV 2: UYGULAMA ]</a>
            <a href="Figure_1.png" class="btn">[ GÖREV 7: GRAFİK (PNG) ]</a>
            <a href="sinav_verileri.csv" class="btn">[ GÖREV 7: VERİ SETİ (CSV) ]</a>
        </div>
        <div class="footer-note">Simülasyon Durumu: <span id="simStatus" style="color:var(--neon-green)">AKTİF</span></div>
    </div>

    <script>
        // İnteraktif Veri Görselleştirme Simülasyonu
        const canvas = document.getElementById('dataCanvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let mouseX = 0, mouseY = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // Fareye göre değişen parametreler
            const amp = mouseY / height * 150 + 20; // Dalga yüksekliği
            const freq = mouseX / width * 0.05 + 0.01; // Dalga sıklığı
            const lines = Math.floor(amp / 10); // Çizgi sayısı

            for(let i=0; i < lines; i++) {
                ctx.beginPath();
                ctx.lineWidth = 1;
                ctx.strokeStyle = `rgba(0, 212, 255, ${1 - i/lines})`; // Neon Mavi
                
                if (i%2 === 0 && mouseX > width/2) ctx.strokeStyle = `rgba(0, 255, 0, ${1 - i/lines})`; // Neon Yeşil

                for(let x=0; x < width; x+=10) {
                    // Fare hareketine göre değişen matematiksel dalga simülasyonu
                    const y = height/2 + Math.sin(x * freq + (Date.now() * 0.002) + i * 0.5) * amp;
                    if(x === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
            requestAnimationFrame(animate);
        }
        animate();

        // Terminal Tipi Log Mesajları
        const stream = document.getElementById('stream');
        const msgs = [
            "> VERİ SETİ ANALİZ EDİLİYOR...", 
            "> Figure_1.png GÖRÜNTÜLENİYOR...", 
            "> DAĞILIM HESAPLANIYOR (µ, σ)...", 
            "> SİSTEM ÇALIŞIYOR > VERİ KARARLI", 
            "> csv DOSYASI OKUNUYOR..."
        ];
        setInterval(() => {
            stream.innerText = msgs[Math.floor(Math.random() * msgs.length)];
        }, 4000);
    </script>
</body>
</html>
