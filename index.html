<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görev 10 UmutKlcc - Global Veri Oyunu</title>
    <style>
        body {
            margin: 0; background: #020617; color: #38bdf8;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: #1e293b; padding: 30px; border-radius: 24px;
            border: 2px solid #38bdf8; width: 400px; text-align: center;
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.2);
        }
        .game-box {
            background: #0f172a; padding: 20px; border-radius: 15px;
            margin: 15px 0; border: 1px solid #334155;
        }
        input {
            width: 85%; padding: 12px; border-radius: 8px; border: 1px solid #38bdf8;
            background: #1e293b; color: white; margin-bottom: 10px; text-align: center;
            font-size: 1rem;
        }
        button {
            background: #38bdf8; color: #020617; border: none;
            padding: 12px; border-radius: 8px; font-weight: bold;
            cursor: pointer; width: 90%; transition: 0.3s;
        }
        button:hover { background: #7dd3fc; transform: scale(1.02); }
        #feedback { margin-top: 15px; font-weight: bold; min-height: 45px; font-size: 0.9rem; color: #fbbf24; }
        .stats { font-size: 0.8rem; color: #94a3b8; margin-top: 5px; }
        .links { margin-top: 20px; border-top: 1px solid #334155; padding-top: 15px; }
        .btn-small { color: #38bdf8; text-decoration: none; font-size: 0.8rem; margin: 0 10px; border-bottom: 1px solid transparent; }
        .btn-small:hover { border-bottom: 1px solid #38bdf8; }
    </style>
</head>
<body>

<div class="container">
    <!-- Senin yüklediğin profil resmi burada görünecek -->
    <img src="resimler/profil.jpeg" alt="Umut" style="width:80px; height:80px; border-radius:50%; border:2px solid #38bdf8; object-fit: cover; margin-bottom: 10px;">
    
    <h2 style="margin:0;">Dünya Veri Dedektifi</h2>
    <p style="font-size: 0.8rem; color: #94a3b8;">Koordinat Analiziyle Gizli Ülkeyi Bul!</p>

    <div class="game-box">
        <input type="text" id="in" placeholder="Ülke ismi yazın (Örn: Türkiye)..." onkeypress="if(event.key==='Enter') play()">
        <button onclick="play()">KONUMU SORGULA</button>
        <div id="feedback">Oyuna başlamak için bir ülke girin!</div>
        <div class="stats">Yapılan Analiz: <span id="c">0</span></div>
    </div>

    <div class="links">
        <!-- Bu linkler senin yüklediğin dosyaları açar, hiçbir şey bozulmaz -->
        <a href="Figure_1.png" class="btn-small">📊 Grafik</a>
        <a href="sinav_verileri.csv" class="btn-small">📂 CSV Veri</a>
        <a href="Görev%202/index.html" class="btn-small">🚀 Görev 2</a>
    </div>
</div>

<script>
// Hocanın istediği "Dünyadaki tüm ülkeler" mantığı için en popüler 40 ülke verisi
const data = {
    "türkiye": [39, 35], "almanya": [51, 10], "fransa": [46, 2], "ingiltere": [55, -3],
    "italya": [41, 12], "ispanya": [40, -3], "rusya": [61, 105], "abd": [37, -95],
    "kanada": [56, -106], "brezilya": [ -14, -51], "arjantin": [-38, -63], "mısır": [26, 30],
    "güney afrika": [-30, 22], "çin": [35, 104], "japonya": [36, 138], "hindistan": [20, 78],
    "avustralya": [-25, 133], "yunanistan": [39, 22], "azerbaycan": [40, 47], "isveç": [60, 18],
    "norveç": [60, 8], "iran": [32, 53], "irak": [33, 44], "suudi arabistan": [23, 45],
    "kazakistan": [48, 68], "ukrayna": [48, 31], "polonya": [51, 20], "meksika": [23, -102],
    "şili": [-35, -71], "kolombiya": [4, -72], "nijerya": [9, 8], "kenya": [1, 38],
    "tayland": [15, 100], "güney kore": [35, 127], "endonezya": [-0.7, 113], "pakistan": [30, 69],
    "hollanda": [52, 5], "belçika": [50, 4], "isviçre": [46, 8], "portekiz": [39, -8]
};

const keys = Object.keys(data);
let target = keys[Math.floor(Math.random() * keys.length)];
let count = 0;

function play() {
    let val = document.getElementById('in').value.toLowerCase().trim();
    let fb = document.getElementById('feedback');
    if(!data[val]) { fb.innerText = "⚠️ Veri setinde bu ülke yok! Başka dene."; return; }
    
    count++;
    document.getElementById('c').innerText = count;
    
    if(val === target) {
        fb.innerHTML = "<span style='color:#4ade80'>🎉 TEBRİKLER! Hedef ülkeyi buldun: " + val.toUpperCase() + "</span>";
        document.getElementById('in').disabled = true;
        return;
    }

    let tPos = data[target], iPos = data[val];
    let y = tPos[0] > iPos[0] ? "Kuzey" : "Güney";
    let x = tPos[1] > iPos[1] ? "Doğu" : "Batı";
    
    fb.innerText = "❌ Yanlış! Hedef ülke " + val.toUpperCase() + " konumuna göre daha " + y + "-" + x + " yönünde.";
}
</script>
</body>
</html>
