<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Umut - Görev 10 Portfolyo</title>
    <style>
        body {
            margin: 0; background: #020617; color: #38bdf8;
            font-family: 'Segoe UI', sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        /* Fareyi takip eden parlama efekti */
        #glow {
            position: fixed; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%);
            z-index: 0;
        }
        .card {
            background: rgba(30, 41, 59, 0.6); padding: 50px;
            border-radius: 24px; border: 1px solid rgba(56, 189, 248, 0.3);
            backdrop-filter: blur(10px); text-align: center; z-index: 1;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .profil-img {
            width: 140px; height: 140px; border-radius: 50%;
            border: 3px solid #38bdf8; margin-bottom: 20px; object-fit: cover;
        }
        .btn {
            display: block; width: 260px; margin: 15px auto; padding: 14px;
            color: #38bdf8; text-decoration: none; border: 1px solid #38bdf8;
            border-radius: 12px; font-weight: bold; transition: 0.3s;
        }
        .btn:hover {
            background: #38bdf8; color: #020617; box-shadow: 0 0 20px #38bdf8;
        }
    </style>
</head>
<body>
    <div id="glow"></div>
    <div class="card">
        <img src="resimler/profil.jpeg" alt="Umut" class="profil-img">
        <h1>UMUT PORTFOLYO</h1>
        <p style="color: #94a3b8;">Veri Bilimi ve Analitiği - Görev 10</p>
        <div class="links">
            <a href="Görev%202/index.html" class="btn">🚀 GÖREV 2: UYGULAMA</a>
            <a href="veri_uret.py" class="btn">📊 GÖREV 7: GRAFİK (PY)</a>
            <a href="sinav_verileri.csv" class="btn">📂 GÖREV 7: VERİ SETİ (CSV)</a>
        </div>
    </div>
    <script>
        const glow = document.getElementById('glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
